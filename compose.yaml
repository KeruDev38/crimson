services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crimson
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crimson"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CRIMSON_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crimson
      CRIMSON_DATASOURCE_USERNAME: postgres
      CRIMSON_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_started
    environment:
      INTERNAL_API_BASE_URL: http://app:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data:
