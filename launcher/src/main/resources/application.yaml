spring:
  application:
    name: crimson
  datasource:
    url: ${CRIMSON_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crimson}
    username: ${CRIMSON_DATASOURCE_USERNAME:postgres}
    password: ${CRIMSON_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    validate-migration-naming: true
    locations: classpath:db/migration

server:
  shutdown: graceful
